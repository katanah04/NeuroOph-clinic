<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script>
(function() {
  const HASH = 'd3c8b616bdbdf69ef8c09d52650541607c92960aa6a23ad3550908c93ce8b511';
  const SESSION_KEY = 'eye_clinic_auth';
  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  async function checkAuth() {
    if (sessionStorage.getItem(SESSION_KEY) === 'ok') return;
    document.body.style.display = 'none';
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:#f0efe8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;font-family:-apple-system,sans-serif;z-index:9999;';
    overlay.innerHTML = '<div style="width:52px;height:52px;background:#1a1915;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;">👁</div><div style="font-size:22px;font-weight:700;color:#1a1915;letter-spacing:-.02em;">眼科追蹤病例</div><div style="display:flex;flex-direction:column;gap:10px;align-items:center;"><input id="pwInput" type="password" placeholder="請輸入密碼" style="padding:10px 16px;font-size:15px;border:1.5px solid rgba(0,0,0,0.15);border-radius:10px;width:240px;outline:none;text-align:center;background:#fff;"><div id="pwError" style="font-size:12px;color:#C93F3E;display:none;">密碼錯誤，請再試一次</div><button id="pwBtn" style="padding:10px 32px;background:#1a1915;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:240px;">進入</button></div>';
    document.body.parentNode.appendChild(overlay);
    const input = overlay.querySelector('#pwInput');
    const btn = overlay.querySelector('#pwBtn');
    const err = overlay.querySelector('#pwError');
    input.focus();
    const verify = async () => {
      const hash = await sha256(input.value);
      if (hash === HASH) {
        sessionStorage.setItem(SESSION_KEY, 'ok');
        overlay.remove();
        document.body.style.display = '';
      } else {
        err.style.display = 'block';
        input.value = '';
        input.focus();
      }
    };
    btn.addEventListener('click', verify);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') verify(); });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', checkAuth);
  } else { checkAuth(); }
})();
</script>

<title>神經眼科診療 Dashboard</title>
<style>
:root {
  --bg: #f0efe8;
  --surface: #ffffff;
  --surface2: #f5f4f0;
  --surface3: #eceae3;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #1a1915;
  --text2: #6b6860;
  --text3: #aaa89f;
  --radius: 10px;
  --radius-lg: 16px;
  --green: #1D9E75;
  --amber: #D4860F;
  --red: #C93F3E;
  --darkred: #8B2020;
  --blue: #1A5FA8;
  --accent: #2E7DD1;
  --purple: #6B3FA0;
}
@media (prefers-color-scheme: dark) {

    --bg: #141412; --surface: #1e1d1b; --surface2: #252420; --surface3: #2c2b28;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif; min-height: 100vh; }

/* TOPBAR */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: .9rem 1.75rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); }
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.topbar-icon { width: 32px; height: 32px; background: var(--text); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
.topbar-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.search-box { margin-left: auto; display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.search-box input, .search-box select { padding: 6px 12px; font-size: 12px; border: 1px solid var(--border2); border-radius: 8px; background: var(--surface2); color: var(--text); outline: none; transition: border-color .15s; }
.search-box input { width: 180px; }
.search-box input:focus, .search-box select:focus { border-color: var(--accent); }
.refresh-btn { padding: 6px 12px; font-size: 12px; border: 1px solid var(--border2); border-radius: 8px; background: var(--surface2); color: var(--text2); cursor: pointer; }
.refresh-btn:hover { background: var(--surface3); color: var(--text); }

/* KPI */
.kpi-row { display: flex; gap: 10px; padding: 1.25rem 1.75rem; flex-wrap: wrap; }
.kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: .8rem 1.1rem; min-width: 120px; flex: 1; }
.kpi-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.kpi-value { font-size: 26px; font-weight: 600; line-height: 1; letter-spacing: -.02em; }
.kpi-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }

/* TABLE */
.table-wrap { padding: 0 1.75rem 2.5rem; }
.tbl-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.tbl-stat { font-size: 12px; color: var(--text3); }
.tbl-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 900px; }
thead th { background: var(--surface2); color: var(--text2); font-weight: 600; padding: 9px 12px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); white-space: nowrap; }
thead th.group-od { background: var(--surface2); color: var(--text2); }
thead th.group-os { background: var(--surface2); color: var(--text2); }
tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text); white-space: nowrap; }
tbody tr:last-child td { border-bottom: none; }
tbody tr { cursor: pointer; transition: background .1s; }
tbody tr:hover td { background: var(--surface2); }
.badge { display: inline-block; padding: 2px 9px; border-radius: 100px; font-size: 10px; font-weight: 600; }
.bm { background: #ddeeff; color: #1A4E8A; }
.bf { background: #fde8ef; color: #8A2040; }
.dx-tag { display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 500; background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
.rapd-pos { color: var(--red); font-weight: 700; font-size: 11px; }
.rapd-neg { color: var(--text3); font-size: 11px; }
.val-na { color: var(--text3); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1.5rem; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px; max-width: 900px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,.25), 0 0 0 1px var(--border); animation: modalIn .2s ease; }
@keyframes modalIn { from { opacity:0; transform: translateY(12px) scale(.98); } to { opacity:1; transform: none; } }
.modal-header { padding: 1.4rem 1.5rem 1.1rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; position: sticky; top: 0; background: var(--surface); z-index: 10; border-bottom: 1px solid var(--border); }
.modal-header-left { display: flex; align-items: flex-start; gap: 12px; }
.modal-id-badge { background: var(--text); color: var(--surface); border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
.modal-header h2 { font-size: 16px; font-weight: 600; }
.modal-header p { font-size: 12px; color: var(--text2); margin-top: 3px; }
.modal-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 12px; color: var(--text2); }
.modal-close:hover { background: var(--surface3); }
.modal-body { padding: 1.4rem 1.5rem; display: flex; flex-direction: column; gap: 1.4rem; }
.section-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }

/* META */
.meta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
.meta-item { background: var(--surface2); border-radius: 9px; padding: .6rem .85rem; border: 1px solid var(--border); }
.meta-label { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
.meta-value { font-size: 13px; font-weight: 500; line-height: 1.3; }

/* CLINICAL PANEL */
.clinical-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.25rem; }

/* OD/OS COMPARISON GRID */
.compare-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; border: 1px solid var(--border2); border-radius: 12px; overflow: hidden; }
.compare-col { display: flex; flex-direction: column; }
.compare-col.od { background: var(--surface); }
.compare-col.os { background: var(--surface); }
.compare-header { padding: 8px 14px; font-size: 11px; font-weight: 700; letter-spacing: .04em; color: var(--text2); border-bottom: 1px solid var(--border2); }
.compare-col.od .compare-header { color: var(--text); }
.compare-col.os .compare-header { color: var(--text); }
.compare-divider { width: 1px; background: var(--border2); }
.compare-row { display: flex; align-items: center; padding: 7px 14px; border-bottom: 1px solid var(--border); gap: 8px; }
.compare-row:last-child { border-bottom: none; }
.compare-label { font-size: 10px; color: var(--text3); width: 52px; flex-shrink: 0; text-transform: uppercase; letter-spacing: .04em; }
.compare-val { font-size: 15px; font-weight: 600; letter-spacing: -.01em; color: var(--text); }
.compare-col.od .compare-val { color: var(--text); }
.compare-col.os .compare-val { color: var(--text); }
.compare-val.abnormal { color: var(--red) !important; }
.compare-val.na { color: var(--text3) !important; font-weight: 400; font-size: 12px; }

/* BAR CHART for RNFL/GCIPL */
.bar-container { padding: 4px 14px 8px; }
.bar-track { height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; margin-top: 4px; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.bar-label-row { display: flex; justify-content: space-between; font-size: 9px; color: var(--text3); margin-top: 2px; }

/* TRACKING */
.track-section { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.25rem; }
.track-tabs { display: flex; gap: 0; background: var(--surface3); border-radius: 8px; padding: 3px; margin-bottom: 1rem; }
.track-tab { flex: 1; padding: 5px 6px; font-size: 11px; font-weight: 500; text-align: center; cursor: pointer; border-radius: 6px; color: var(--text2); background: none; border: none; }
.track-tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.chart-wrap { position: relative; height: 200px; }
.chart-legend { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.fu-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: .75rem; }
.fu-table th { background: var(--surface3); color: var(--text2); font-weight: 600; padding: 6px 10px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); white-space: nowrap; }
.fu-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; }
.fu-table tr:last-child td { border-bottom: none; }
.fu-table tr.baseline td { background: var(--surface3); font-weight: 500; }
.input-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: .75rem; }
.input-group { display: flex; flex-direction: column; gap: 3px; }
.input-group label { font-size: 9px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.input-group input { padding: 6px 9px; font-size: 12px; border: 1px solid var(--border2); border-radius: 7px; background: var(--surface); color: var(--text); outline: none; }
.input-group input:focus { border-color: var(--accent); }
.input-group.full { grid-column: 1/-1; }
.form-footer { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }
.btn-secondary:hover { background: var(--surface3); color: var(--text); }

/* REMARK */
.remark-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1rem; font-size: 13px; color: var(--text2); line-height: 1.6; }

/* FOLLOW-UP FORM */
.fu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 300; display: none; align-items: center; justify-content: center; padding: 1.5rem; backdrop-filter: blur(4px); }

.fu-body { padding: 1.2rem 1.4rem; display: flex; flex-direction: column; gap: 1rem; }
.fu-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fu-field { display: flex; flex-direction: column; gap: 4px; }
.fu-field label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.fu-field input, .fu-field textarea { padding: 7px 10px; font-size: 13px; border: 1px solid var(--border2); border-radius: 8px; background: var(--surface2); color: var(--text); outline: none; font-family: inherit; }
.fu-field input:focus, .fu-field textarea:focus { border-color: var(--accent); }
.fu-field.full { grid-column: 1 / -1; }
.fu-od { border-left: 3px solid var(--blue); padding-left: 8px; }
.fu-os { border-left: 3px solid #8B3A1A; padding-left: 8px; }
.fu-footer { padding: .9rem 1.4rem; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
.btn { padding: 8px 18px; font-size: 13px; border-radius: 9px; border: none; cursor: pointer; font-weight: 500; font-family: inherit; }
.btn-primary { background: var(--text); color: var(--surface); }

.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border2); }

.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: var(--surface); padding: .75rem 1.2rem; border-radius: 10px; font-size: 13px; font-weight: 500; z-index: 500; display: none; animation: toastIn .2s ease; }
.toast.show { display: block; }
@keyframes toastIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
.track-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; font-size: 11px; font-weight: 600; background: #EEF5FF; color: var(--blue); border: 1px solid #C5D9F5; border-radius: 7px; cursor: pointer; text-decoration: none; }
.track-btn:hover { background: #ddeeff; }
</style>

              <div class="input-group"><label>視力 OD</label><input type="text" id="fuCvd" placeholder="e.g. 6/6"></div>
              <div class="input-group"><label>視力 OS</label><input type="text" id="fuCvs" placeholder="e.g. 6/12"></div>
              <div class="input-group"><label>RNFL OD</label><input type="number" id="fuRnflOd" placeholder="μm"></div>
              <div class="input-group"><label>RNFL OS</label><input type="number" id="fuRnflOs" placeholder="μm"></div>
              <div class="input-group"><label>GCIPL OD</label><input type="number" id="fuGcipOd" placeholder="μm"></div>
              <div class="input-group"><label>GCIPL OS</label><input type="number" id="fuGcipOs" placeholder="μm"></div>
              <div class="input-group"><label>VF MD OD</label><input type="number" step="0.01" id="fuVfOd" placeholder="dB"></div>
              <div class="input-group"><label>VF MD OS</label><input type="number" step="0.01" id="fuVfOs" placeholder="dB"></div>
              <div class="input-group full"><label>備註</label><input type="text" id="fuNote" placeholder="選填"></div>
            </div>
            <div class="form-footer">
              <button class="btn btn-primary" id="fuSaveBtn" onclick="submitFU()">💾 儲存</button>
              <button class="btn btn-secondary" onclick="clearFuForm()">清除</button>
              <span class="save-ok" id="fuSaveOk">✓ 已儲存！</span>
            </div>
          </div>
        </div>
      </div>
      <div id="mRemarkWrap">
        <div class="section-title">備註 / 影像學</div>
        <div class="remark-box" id="mRemark"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://eiuztjstarcyrgegdeyx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdXp0anN0YXJjeXJnZWdkZXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMzg4MjUsImV4cCI6MjA5NjkxNDgyNX0.wxOSIaL85pDNqAWJrI3NSPTGxBOXEEn3RUsgd5Sbgs4';

const supaFetch = async (table) => {
  const res = await fetch(`${SUPA_URL}/rest/v1/${table}?select=*`, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
  });
  return res.json();
};

const supaInsert = async (table, row) => {
  const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(row)
  });
  return res.ok;
};

let RAW = [], FOLLOWUPS = [], currentPatient = null, trackChartInst = null, currentChartType = 'rnfl';

const clean = v => {
  const s = String(v||'').trim();
  if (!s || s==='0' || s.includes('GMT') || s.includes('00:00:00') || /^\d{4}-\d{2}-\d{2}T/.test(s)) return '';
  return s;
};

// ── RAPD ──────────────────────────────────────────────────────────────────
function isRapdPos(v) {
  const s=(v||'').toLowerCase().trim();
  return s && s!=='neg' && s!=='negative' && s!=='na' && s!=='0' && s!=='no';
}
function rapdLabel(v) {
  if (!v || v.toLowerCase()==='na') return '<span class="rapd-neg">—</span>';
  if (!isRapdPos(v)) return '<span class="rapd-neg">陰性</span>';
  return `<span class="rapd-pos">${v.toUpperCase()}</span>`;
}

// ── COMPARE GRID ──────────────────────────────────────────────────────────
function compareGrid(p) {
  const rows = [
    {label:'視力', od:p.cvd, os:p.cvs},
    {label:'眼底', od:p.fdod, os:p.fdos},
    {label:'RNFL', od:p.rnflod, os:p.rnflos},
    {label:'GCIPL', od:p.gcipod, os:p.gcipos},
    {label:'VF MD', od:p.vfod, os:p.vfos},
  ];
  const cell = v => v ? `<div class="compare-val">${v}</div>` : `<div class="compare-val na">—</div>`;
  const odRows = rows.map(r=>`<div class="compare-row"><div class="compare-label">${r.label}</div><div style="flex:1">${cell(r.od)}</div></div>`).join('');
  const osRows = rows.map(r=>`<div class="compare-row"><div class="compare-label">${r.label}</div><div style="flex:1">${cell(r.os)}</div></div>`).join('');
  return `<div class="compare-grid">
    <div class="compare-col od"><div class="compare-header">OD 右眼</div>${odRows}</div>
    <div class="compare-divider"></div>
    <div class="compare-col os"><div class="compare-header">OS 左眼</div>${osRows}</div>
  </div>`;
}

// ── TRACKING CHART ────────────────────────────────────────────────────────
function allTrackPoints(p) {
  const fus = FOLLOWUPS.filter(f=>f.id===p.id).sort((a,b)=>a.date.localeCompare(b.date));
  const pts = [];
  if (p.date) pts.push({...p, note:'初診', isBaseline:true});
  fus.forEach(f => pts.push({...f, isBaseline:false}));
  return pts;
}

function vaToNum(v) {
  if (!v) return null;
  const s=v.trim().toLowerCase();
  if(s==='cf') return 0.05; if(s==='hm') return 0.02; if(s==='lp') return 0.01; if(s==='npl'||s==='np') return 0;
  const m=s.match(/^(\d+)\/(\d+)$/);
  return m ? parseInt(m[1])/parseInt(m[2]) : null;
}

function drawTrackChart(pts, type) {
  if (trackChartInst) { trackChartInst.destroy(); trackChartInst=null; }
  const ctx = document.getElementById('trackChart');
  if (!ctx) return;
  const km = {rnfl:['rnflod','rnflos','RNFL (μm)'], gcipl:['gcipod','gcipos','GCIPL (μm)'], vf:['vfod','vfos','VF MD (dB)'], va:['cvd','cvs','視力']};
  const [odK,osK,yLabel] = km[type];
  const parse = v => type==='va' ? vaToNum(v) : (v ? parseFloat(v) : null);
  trackChartInst = new Chart(ctx, {
    type:'line',
    data:{
      labels: pts.map(p=>p.date),
      datasets:[
        {label:'OD', data:pts.map(p=>parse(p[odK])), borderColor:'#1A5FA8', backgroundColor:'rgba(26,95,168,0.07)',
         pointBackgroundColor:pts.map(p=>p.isBaseline?'#fff':'#1A5FA8'), pointBorderColor:'#1A5FA8', pointBorderWidth:2, pointRadius:5, tension:0.3, spanGaps:true},
        {label:'OS', data:pts.map(p=>parse(p[osK])), borderColor:'#8B3A1A', backgroundColor:'rgba(139,58,26,0.07)',
         pointBackgroundColor:pts.map(p=>p.isBaseline?'#fff':'#8B3A1A'), pointBorderColor:'#8B3A1A', pointBorderWidth:2, pointRadius:5, tension:0.3, spanGaps:true},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y??'—'}`, afterLabel:c=>pts[c.dataIndex].note?`備註: ${pts[c.dataIndex].note}`:''}}},
      scales:{x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:10}}}, y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:10}},title:{display:true,text:yLabel,font:{size:10}}}}
    }
  });
}

function switchTrackChart(type, btn) {
  currentChartType = type;
  document.querySelectorAll('.track-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if (currentPatient) drawTrackChart(allTrackPoints(currentPatient), type);
}

function renderFuTable(pts) {
  const tbl = document.getElementById('fuTable');
  if (!tbl) return;
  tbl.innerHTML = `<thead><tr>
    <th>日期</th><th>視力 OD</th><th>視力 OS</th>
    <th>RNFL OD</th><th>RNFL OS</th>
    <th>GCIPL OD</th><th>GCIPL OS</th>
    <th>VF MD OD</th><th>VF MD OS</th><th>備註</th>
  </tr></thead>
  <tbody>${pts.map(pt=>`<tr class="${pt.isBaseline?'baseline':''}">
    <td>${pt.date}${pt.isBaseline?' <span style="font-size:9px;color:var(--text3)">(初診)</span>':''}</td>
    <td>${pt.cvd||'—'}</td><td>${pt.cvs||'—'}</td>
    <td>${pt.rnflod||'—'}</td><td>${pt.rnflos||'—'}</td>
    <td>${pt.gcipod||'—'}</td><td>${pt.gcipos||'—'}</td>
    <td>${pt.vfod||'—'}</td><td>${pt.vfos||'—'}</td>
    <td style="color:var(--text2)">${pt.note||'—'}</td>
  </tr>`).join('')}</tbody>`;
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function openModal(p) {
  currentPatient = p;
  document.getElementById('mId').textContent = p.id;
  document.getElementById('mTitle').textContent = p.dx || '診斷未填';
  document.getElementById('mSub').textContent = [p.cc, p.age?`${p.age} 歲`:null, p.sex==='M'?'男':p.sex==='F'?'女':null, p.date].filter(Boolean).join(' · ');

  const meta = [
    {label:'年齡', val:p.age??'—'}, {label:'性別', val:p.sex==='M'?'男':p.sex==='F'?'女':'—'},
    {label:'轉介來源', val:p.ref||'—'}, {label:'主訴', val:p.cc||'—'},
    {label:'病史', val:p.ph||'—'}, {label:'RAPD', val:p.rapd||'—'},
    {label:'影像學', val:p.img||'—'}, {label:'初診日期', val:p.date||'—'},
  ];
  document.getElementById('mMeta').innerHTML = meta.map(m=>
    `<div class="meta-item"><div class="meta-label">${m.label}</div><div class="meta-value">${m.val}</div></div>`
  ).join('');
  document.getElementById('mClinical').innerHTML = compareGrid(p);

  const remParts = [p.rem, p.img?`影像：${p.img}`:''].filter(Boolean);
  document.getElementById('mRemark').innerHTML = remParts.length ? remParts.join('<br>') : '<span style="color:var(--text3)">—</span>';

  // Reset form
  document.getElementById('fuDate').value = new Date().toISOString().slice(0,10);
  clearFuForm();

  // Reset tabs
  document.querySelectorAll('.track-tab').forEach((t,i) => t.classList.toggle('active', i===0));
  currentChartType = 'rnfl';

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Draw chart after modal animation completes
  setTimeout(() => {
    const pts = allTrackPoints(p);
    renderFuTable(pts);
    drawTrackChart(pts, 'rnfl');
  }, 220);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
  if (trackChartInst) { trackChartInst.destroy(); trackChartInst=null; }
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// ── FOLLOW-UP SAVE ────────────────────────────────────────────────────────
async function submitFU() {
  if (!currentPatient) return;
  const date = document.getElementById('fuDate').value;
  if (!date) { alert('請填入日期'); return; }
  const row = {
    'ID': currentPatient.id, 'Date': date,
    'CVd': document.getElementById('fuCvd').value.trim(),
    'CVs': document.getElementById('fuCvs').value.trim(),
    'RNFL-od': document.getElementById('fuRnflOd').value.trim(),
    'RNFL-os': document.getElementById('fuRnflOs').value.trim(),
    'GCIPL-od': document.getElementById('fuGcipOd').value.trim(),
    'GCIPL-os': document.getElementById('fuGcipOs').value.trim(),
    'VF MD-od': document.getElementById('fuVfOd').value.trim(),
    'VF MD-os': document.getElementById('fuVfOs').value.trim(),
    'Note': document.getElementById('fuNote').value.trim(),
  };
  const btn = document.getElementById('fuSaveBtn');
  btn.textContent='儲存中…'; btn.disabled=true;
  try {
    await supaInsert('neuro_followup', {
      'ID': currentPatient.id, 'Date': date,
      'CVd': row['CVd'], 'CVs': row['CVs'],
      'RNFL-od': row['RNFL-od'], 'RNFL-os': row['RNFL-os'],
      'GCIPL-od': row['GCIPL-od'], 'GCIPL-os': row['GCIPL-os'],
      'VF MD-od': row['VF MD-od'], 'VF MD-os': row['VF MD-os'],
      'Note': row['Note'],
    });
    FOLLOWUPS.push({id:currentPatient.id, date, cvd:row['CVd'], cvs:row['CVs'], rnflod:row['RNFL-od'], rnflos:row['RNFL-os'], gcipod:row['GCIPL-od'], gcipos:row['GCIPL-os'], vfod:row['VF MD-od'], vfos:row['VF MD-os'], note:row['Note'], isBaseline:false});
    clearFuForm();
    const ok = document.getElementById('fuSaveOk');
    ok.style.display='inline'; setTimeout(()=>ok.style.display='none',3000);
    const pts = allTrackPoints(currentPatient);
    drawTrackChart(pts, currentChartType);
    renderFuTable(pts);
  } catch(e) {
    alert('儲存失敗，請確認網路連線');
  } finally {
    btn.textContent='💾 儲存'; btn.disabled=false;
  }
}

function clearFuForm() {
  ['fuCvd','fuCvs','fuRnflOd','fuRnflOs','fuGcipOd','fuGcipOs','fuVfOd','fuVfOs','fuNote'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.value='';
  });
}

// ── NORMALISE ─────────────────────────────────────────────────────────────
function normalizeRow(r) {
  return {
    id:clean(r['ID']), age:r['Age']?parseInt(r['Age']):null,
    sex:clean(r['Sex']), ref:clean(r['Referral']), cc:clean(r['CC']), ph:clean(r['PH']),
    cvd:clean(r['CVd']), cvs:clean(r['CVs']),
    fdod:clean(r['Fd-od']), fdos:clean(r['Fd-os']),
    rnflod:clean(r['RNFL-od']), rnflos:clean(r['RNFL-os']),
    gcipod:clean(r['GCIPL-od']), gcipos:clean(r['GCIPL-os']),
    vfod:clean(r['VF MD-od']), vfos:clean(r['VF MD-os']),
    rapd:clean(r['RAPD']), img:clean(r['Neuroimaging']),
    rem:clean(r['Remark']), dx:clean(r['Dx']), date:clean(r['FirstDate']),
  };
}

function normalizeFU(r) {
  return {
    id:clean(r['ID']), date:clean(r['Date']),
    cvd:clean(r['CVd']), cvs:clean(r['CVs']),
    rnflod:clean(r['RNFL-od']), rnflos:clean(r['RNFL-os']),
    gcipod:clean(r['GCIPL-od']), gcipos:clean(r['GCIPL-os']),
    vfod:clean(r['VF MD-od']), vfos:clean(r['VF MD-os']),
    note:clean(r['Note']), isBaseline:false,
  };
}

// ── TABLE ─────────────────────────────────────────────────────────────────
function renderTable() {
  const q=document.getElementById('q').value.toLowerCase();
  const sf=document.getElementById('sexF').value;
  const df=document.getElementById('dxF').value;
  const rf=document.getElementById('rapdF').value;
  const fil=RAW.filter(p=>{
    const mq=!q||[p.id,p.dx,p.cc,p.rem,p.ph].join(' ').toLowerCase().includes(q);
    const ms=!sf||p.sex===sf;
    const md=!df||p.dx===df;
    const mr=!rf||(rf==='pos'?isRapdPos(p.rapd):!isRapdPos(p.rapd));
    return mq&&ms&&md&&mr;
  });
  document.getElementById('tstat').textContent=`顯示 ${fil.length} / ${RAW.length} 位病人`;
  const n=v=>v?v:'<span class="val-na">—</span>';
  document.getElementById('tbody').innerHTML=fil.map(p=>{
    const sx=p.sex==='M'?'<span class="badge bm">男</span>':p.sex==='F'?'<span class="badge bf">女</span>':'—';
    const fuCnt=FOLLOWUPS.filter(f=>f.id===p.id).length;
    return `<tr onclick="openModal(RAW.find(r=>r.id==='${p.id}'&&r.date==='${p.date}'))">
      <td style="font-weight:600">${p.id}</td>
      <td>${p.age??'—'}</td>
      <td>${sx}</td>
      <td>${p.dx?`<span class="dx-tag">${p.dx}`+'</span>':'—'}</td>
      <td>${p.cc||'—'}</td>
      <td>${rapdLabel(p.rapd)}</td>
      <td style="border-left:1px solid var(--border)">${n(p.cvd)}</td>
      <td>${n(p.cvs)}</td>
      <td style="border-left:1px solid var(--border)">${n(p.rnflod)}</td>
      <td>${n(p.rnflos)}</td>
      <td style="border-left:1px solid var(--border)">${n(p.gcipod)}</td>
      <td>${n(p.gcipos)}</td>
      <td style="border-left:1px solid var(--border)">${n(p.vfod)}</td>
      <td>${n(p.vfos)}</td>
      <td>${p.date||'—'}${fuCnt>0?` <span style="font-size:10px;color:var(--green)">·${fuCnt}追</span>`:''}</td>
    </tr>`;
  }).join('');
}

// ── INIT ──────────────────────────────────────────────────────────────────
function initDashboard() {
  const ages=RAW.map(p=>p.age).filter(a=>a!==null&&!isNaN(a));
  document.getElementById('kN').textContent=RAW.length;
  if(ages.length){
    document.getElementById('kAge').textContent=Math.round(ages.reduce((a,b)=>a+b,0)/ages.length);
    document.getElementById('kAgeR').textContent=`${Math.min(...ages)}–${Math.max(...ages)} 歲`;
  }
  document.getElementById('kRapd').textContent=RAW.filter(p=>isRapdPos(p.rapd)).length;
  document.getElementById('kNeuro').textContent=RAW.filter(p=>p.img&&p.img!=='NA'&&p.img!=='').length;
  document.getElementById('kVF').textContent=RAW.filter(p=>p.vfod||p.vfos).length;
  document.getElementById('subtitle').textContent=`${RAW.length} 位病人 · ${FOLLOWUPS.length} 筆追蹤 · ${new Date().toLocaleTimeString('zh-TW')}`;
  const dxSel=document.getElementById('dxF');
  dxSel.innerHTML='<option value="">全部診斷</option>';
  [...new Set(RAW.map(p=>p.dx).filter(Boolean))].sort().forEach(d=>{
    const o=document.createElement('option'); o.value=d; o.textContent=d; dxSel.appendChild(o);
  });
  renderTable();
}

async function loadData() {
  document.getElementById('subtitle').innerHTML='⟳ 載入中…';
  try {
    const [pRows, fRows] = await Promise.all([
      supaFetch('neuro_patients'),
      supaFetch('neuro_followup')
    ]);
    RAW = pRows.map(normalizeRow).filter(p=>p.id&&p.id.length>2);
    FOLLOWUPS = fRows.map(normalizeFU).filter(f=>f.id&&f.date);
    initDashboard();
  } catch(e) {
    document.getElementById('subtitle').textContent='⚠ 無法載入資料';
    console.error(e);
  }
}

document.getElementById('refreshBtn').onclick=loadData;
loadData();
</script>
</body>
</html>
