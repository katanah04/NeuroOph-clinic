<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眼科追蹤病例</title>
<style>
:root {
  --bg: #f0efe8;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.11);
  --text: #1a1915;
  --text2: #6b6860;
  --text3: #aaa89f;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141412; --surface: #1e1d1b;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #edecea; --text2: #9c9a93; --text3: #5a5855;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3.5rem; padding: 2rem;
}

.header { text-align: center; }
.header-icon {
  width: 56px; height: 56px;
  background: var(--text); border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin: 0 auto 1.1rem;
  box-shadow: 0 4px 16px rgba(0,0,0,.12);
}
.header h1 {
  font-size: 28px; font-weight: 700;
  letter-spacing: -.03em; line-height: 1;
}

.cards {
  display: flex; gap: 1.25rem;
  flex-wrap: wrap; justify-content: center;
  width: 100%; max-width: 560px;
}

.card {
  flex: 1; min-width: 200px; max-width: 260px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 2.25rem 1.5rem;
  text-decoration: none; color: var(--text);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1rem;
  transition: box-shadow .2s ease, transform .18s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
}
.card:hover {
  box-shadow: 0 12px 40px rgba(0,0,0,.13);
  transform: translateY(-3px);
}
.card:active { transform: translateY(-1px); }

.card-icon {
  width: 64px; height: 64px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.card-icon.neuro { background: #EDF4FF; }
.card-icon.strab { background: #EDFBF5; }

.card-title {
  font-size: 18px; font-weight: 700;
  letter-spacing: -.02em;
  text-align: center;
}

.card-arrow {
  font-size: 18px; color: var(--text3);
  transition: color .15s, transform .15s;
}
.card:hover .card-arrow {
  color: var(--text2);
  transform: translateX(3px);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">👁</div>
  <h1>眼科追蹤病例</h1>
</div>

<div class="cards">
  <a class="card" href="neuro_dashboard.html">
    <div class="card-icon neuro">🧠</div>
    <div class="card-title">神經眼科</div>
    <div class="card-arrow">→</div>
  </a>
  <a class="card" href="strabismus_dashboard.html">
    <div class="card-icon strab">👀</div>
    <div class="card-title">斜視</div>
    <div class="card-arrow">→</div>
  </a>
</div>

</body>
</html>
