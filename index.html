<!DOCTYPE html>
<html lang="zh-TW">
<head>
<script>
(function() {
  const HASH = 'd3c8b616bdbdf69ef8c09d52650541607c92960aa6a23ad3550908c93ce8b511';
  const SESSION_KEY = 'eye_clinic_auth';
  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  async function checkAuth() {
    if (sessionStorage.getItem(SESSION_KEY) === 'ok') return;
    document.body.style.display = 'none';
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:#f0efe8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;font-family:-apple-system,sans-serif;z-index:9999;';
    overlay.innerHTML = '<div style="width:52px;height:52px;background:#1a1915;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;">👁</div><div style="font-size:22px;font-weight:700;color:#1a1915;letter-spacing:-.02em;">眼科追蹤病例</div><div style="display:flex;flex-direction:column;gap:10px;align-items:center;"><input id="pwInput" type="password" placeholder="請輸入密碼" style="padding:10px 16px;font-size:15px;border:1.5px solid rgba(0,0,0,0.15);border-radius:10px;width:240px;outline:none;text-align:center;background:#fff;"><div id="pwError" style="font-size:12px;color:#C93F3E;display:none;">密碼錯誤，請再試一次</div><button id="pwBtn" style="padding:10px 32px;background:#1a1915;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:240px;">進入</button></div>';
    document.body.parentNode.appendChild(overlay);
    const input = overlay.querySelector('#pwInput');
    const btn = overlay.querySelector('#pwBtn');
    const err = overlay.querySelector('#pwError');
    input.focus();
    const verify = async () => {
      const hash = await sha256(input.value);
      if (hash === HASH) {
        sessionStorage.setItem(SESSION_KEY, 'ok');
        overlay.remove();
        document.body.style.display = '';
      } else {
        err.style.display = 'block';
        input.value = '';
        input.focus();
      }
    };
    btn.addEventListener('click', verify);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') verify(); });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', checkAuth);
  } else { checkAuth(); }
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>眼科追蹤病例</title>
<style>
:root {
  --bg: #f0efe8;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.11);
  --text: #1a1915;
  --text2: #6b6860;
  --text3: #aaa89f;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141412; --surface: #1e1d1b;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #edecea; --text2: #9c9a93; --text3: #5a5855;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3.5rem; padding: 2rem;
}

.header { text-align: center; }
.header-icon {
  width: 56px; height: 56px;
  background: var(--text); border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin: 0 auto 1.1rem;
  box-shadow: 0 4px 16px rgba(0,0,0,.12);
}
.header h1 {
  font-size: 28px; font-weight: 700;
  letter-spacing: -.03em; line-height: 1;
}

.cards {
  display: flex; gap: 1.25rem;
  flex-wrap: wrap; justify-content: center;
  width: 100%; max-width: 560px;
}

.card {
  flex: 1; min-width: 200px; max-width: 260px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 2.25rem 1.5rem;
  text-decoration: none; color: var(--text);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1rem;
  transition: box-shadow .2s ease, transform .18s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
}
.card:hover {
  box-shadow: 0 12px 40px rgba(0,0,0,.13);
  transform: translateY(-3px);
}
.card:active { transform: translateY(-1px); }

.card-icon {
  width: 64px; height: 64px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.card-icon.neuro { background: #EDF4FF; }
.card-icon.strab { background: #EDFBF5; }

.card-title {
  font-size: 18px; font-weight: 700;
  letter-spacing: -.02em;
  text-align: center;
}

.card-arrow {
  font-size: 18px; color: var(--text3);
  transition: color .15s, transform .15s;
}
.card:hover .card-arrow {
  color: var(--text2);
  transform: translateX(3px);
}
</style>
</head>

  <div class="header-icon">👁</div>

</div>

    <div class="card-arrow">→</div>

</div>

</html>
