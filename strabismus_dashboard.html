<!DOCTYPE html>

<script>
(function() {
  const HASH = 'd3c8b616bdbdf69ef8c09d52650541607c92960aa6a23ad3550908c93ce8b511';
  const SESSION_KEY = 'eye_clinic_auth';
  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  async function checkAuth() {
    if (sessionStorage.getItem(SESSION_KEY) === 'ok') return;
    document.body.style.display = 'none';
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:#f0efe8;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;font-family:-apple-system,sans-serif;z-index:9999;';
    overlay.innerHTML = '<div style="width:52px;height:52px;background:#1a1915;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;">👁</div><div style="font-size:22px;font-weight:700;color:#1a1915;letter-spacing:-.02em;">眼科追蹤病例</div><div style="display:flex;flex-direction:column;gap:10px;align-items:center;"><input id="pwInput" type="password" placeholder="請輸入密碼" style="padding:10px 16px;font-size:15px;border:1.5px solid rgba(0,0,0,0.15);border-radius:10px;width:240px;outline:none;text-align:center;background:#fff;"><div id="pwError" style="font-size:12px;color:#C93F3E;display:none;">密碼錯誤，請再試一次</div><button id="pwBtn" style="padding:10px 32px;background:#1a1915;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:240px;">進入</button></div>';
    document.body.parentNode.appendChild(overlay);
    const input = overlay.querySelector('#pwInput');
    const btn = overlay.querySelector('#pwBtn');
    const err = overlay.querySelector('#pwError');
    input.focus();
    const verify = async () => {
      const hash = await sha256(input.value);
      if (hash === HASH) {
        sessionStorage.setItem(SESSION_KEY, 'ok');
        overlay.remove();
        document.body.style.display = '';
      } else {
        err.style.display = 'block';
        input.value = '';
        input.focus();
      }
    };
    btn.addEventListener('click', verify);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') verify(); });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', checkAuth);
  } else { checkAuth(); }
})();
</script>

<style>

<script>
const SUPA_URL = 'https://eiuztjstarcyrgegdeyx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdXp0anN0YXJjeXJnZWdkZXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMzg4MjUsImV4cCI6MjA5NjkxNDgyNX0.wxOSIaL85pDNqAWJrI3NSPTGxBOXEEn3RUsgd5Sbgs4';

const supaFetch = async (table, params = '') => {
  const res = await fetch(`${SUPA_URL}/rest/v1/${table}?select=*${params}`, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
  });
  return res.json();
};

const supaInsert = async (table, row) => {
  const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${SUPA_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(row)
  });
  return res.ok;
};

let RAW = [], FOLLOWUPS = [], currentPatient = null;

// ── COLOUR HELPERS ─────────────────────────────────────────────────────────
function gradeColor(g) {
  if (g === null || g === undefined) return 'var(--green)';
  if (typeof g === 'string') {
    if (g === 'trace' || g === '0.3' || g === '0.5') return 'var(--amber)';
    if (g.includes('~')) {
      const parts = g.split('~').map(Number);
      const max = Math.max(...parts);
      return max >= 3 ? 'var(--darkred)' : max >= 2 ? 'var(--red)' : 'var(--amber)';
    }
  }
  const n = Math.abs(parseFloat(g));
  if (n === 0) return 'var(--green)';
  if (n <= 1) return 'var(--amber)';
  if (n <= 2) return 'var(--red)';
  if (n <= 3) return 'var(--darkred)';
  return 'var(--xdarkred)';
}
function overColor(g) { return 'var(--blue)'; }

// ── PCT PARSER ─────────────────────────────────────────────────────────────
function parsePCT(raw) {
  if (!raw || !raw.trim()) return null;
  const r = raw.trim();

  // Special cases
  if (r.toLowerCase().startsWith('hirschberg')) return { special: r };

  const result = { far: null, near: null };

  // Parse far and near sections
  function parseSection(str) {
    // str like: "35-18-8PD ET" or "10PD XT, 0-2-2PD R/L, 5V2PD R/L" or "ortho OU" or "4-5-3PD L/R, 4V6PD L/R"
    const sec = { right: null, primary: null, left: null, tiltR: null, tiltL: null, horiz: null };

    // Check for ortho
    if (/^ortho\s*(ou)?$/i.test(str.trim())) {
      sec.primary = { val: 'ortho', type: '' };
      return sec;
    }

    // Split by comma
    const parts = str.split(',').map(s => s.trim());

    for (const part of parts) {
      // Vertical gaze: "5V2PD R/L" or "10V6PD R/L"
      const vMatch = part.match(/^(\d+)V(\d+)\s*PD\s+([A-Z\/\(\)]+)$/i);
      if (vMatch) {
        sec.tiltR = { val: vMatch[1], type: vMatch[3].toUpperCase() };
        sec.tiltL = { val: vMatch[2], type: vMatch[3].toUpperCase() };
        continue;
      }

      // Gaze triples: "35-18-8PD ET" or ">30PD L/R" or "8-8-14 PD ET" or "can't-8PD-ortho ET"
      const triMatch = part.match(/^([\d>]+|can't)[\- ]([\w.>]+)[\- ]([\w.]+)\s*(?:sc\s*)?PD\s+([A-Z\/\(\)]+)$/i);
      if (triMatch) {
        const [, r, p, l, type] = triMatch;
        sec.right = { val: r.toLowerCase() === "can't" ? "can't fix" : r, type: type.toUpperCase() };
        sec.primary = { val: p.toLowerCase() === 'ortho' ? 'ortho' : p, type: type.toUpperCase() };
        sec.left = { val: l.toLowerCase() === 'ortho' ? 'ortho' : l, type: type.toUpperCase() };
        continue;
      }

      // Single primary: "30PD ET" or ">30PD L/R" or "8PD L/R" or "45PD ET" or "8PD XT" or "35PD X(T)"
      const singleMatch = part.match(/^(>?\d+)\s*(?:sc\s*)?PD\s+([A-Z\/\(\)]+)$/i);
      if (singleMatch) {
        const val = singleMatch[1];
        const type = singleMatch[2].toUpperCase();
        // If we already have a primary (horiz component), store as secondary
        if (sec.primary) {
          sec.horiz = { val, type };
        } else {
          sec.primary = { val, type };
        }
        continue;
      }

      // Gaze triples without hyphen separator for numbers: already handled above
    }
    return sec;
  }

  // Split far / near
  const farMatch = r.match(/F\s+(.+?)(?:\s*,\s*N\s+(.+))?$/i);
  if (farMatch) {
    result.far = parseSection(farMatch[1]);
    if (farMatch[2]) result.near = parseSection(farMatch[2]);
  } else {
    result.far = parseSection(r);
  }

  return result;
}

// ── EOM PARSER ─────────────────────────────────────────────────────────────
// Returns {od: {up,down,left,right,ul,ur,dl,dr, frozen}, os: {same}}
function parseEOM(raw) {
  if (!raw || !raw.trim()) return null;
  const r = raw.trim().toLowerCase();

  const od = { up:0,down:0,left:0,right:0,ul:0,ur:0,dl:0,dr:0,frozen:false,note:'' };
  const os = { up:0,down:0,left:0,right:0,ul:0,ur:0,dl:0,dr:0,frozen:false,note:'' };

  if (r === 'full ou') return { od, os };
  if (r.includes('frozen od')) { od.frozen = true; }
  if (r.includes('frozen os')) { os.frozen = true; }

  const applyGrade = (direction, gradeStr, eyeCode) => {
    const g = gradeStr.replace(/^-/, '');
    switch(direction) {
      case 'abduction':
        if (eyeCode === 'od' || eyeCode === 'ou') od.left = g;
        if (eyeCode === 'os' || eyeCode === 'ou') os.right = g;
        break;
      case 'adduction':
        if (eyeCode === 'od' || eyeCode === 'ou') od.right = g;
        if (eyeCode === 'os' || eyeCode === 'ou') os.left = g;
        break;
      case 'supraduction':
        if (eyeCode === 'od' || eyeCode === 'ou') od.up = g;
        if (eyeCode === 'os' || eyeCode === 'ou') os.up = g;
        break;
      case 'infraduction':
        if (eyeCode === 'od' || eyeCode === 'ou') od.down = g;
        if (eyeCode === 'os' || eyeCode === 'ou') os.down = g;
        break;
    }
  };

  // IOOA
  const iooaMatches = raw.matchAll(/IOOA\s*\(([+\-\d.]+)\s+(od|os|ou)\)/gi);
  for (const m of iooaMatches) {
    const grade = m[1];
    const eye = m[2].toLowerCase();
    if (eye === 'od' || eye === 'ou') od.ur = grade;
    if (eye === 'os' || eye === 'ou') os.ul = grade;
  }

  // Find all "limited X (...)" or standalone "X (...)" direction entries
  // First normalise: add "limited " prefix if missing after a comma
  // Strategy: find all direction keywords with their parenthesised grades
  const DIRS = 'abduction|adduction|supraduction|infraduction';
  const dirRegex = new RegExp(`(?:limited\\s+)?(${DIRS})\\s*\\(([^)]+)\\)`, 'gi');
  const dirMatches = raw.matchAll(dirRegex);

  for (const match of dirMatches) {
    const dir = match[1].toLowerCase();
    const details = match[2];

    // Parse eye-specific grades inside parens: "-2 od", "-1 os", "-2 ou", "-1~2 os", "-1 od, -2 os"
    const eyeParts = details.matchAll(/([\-\d~.]+)\s*(od|os|ou)/gi);
    let found = false;
    for (const ep of eyeParts) {
      found = true;
      applyGrade(dir, ep[1], ep[2].toLowerCase());
    }
    // If no eye specified, default to ou
    if (!found) {
      const gradeOnly = details.match(/([\-\d~.]+)/);
      if (gradeOnly) applyGrade(dir, gradeOnly[1], 'ou');
    }
  }

  // Slow saccade note
  if (r.includes('slow saccade')) {
    os.note = 'slow saccade';
  }

  return { od, os };
}

// ── RENDER EOM SVG ─────────────────────────────────────────────────────────
function eomSVG(eyeData, eyeLabel, isOS) {
  if (!eyeData) return '';
  const { up, down, left, right, ul, ur, dl, dr, frozen, note } = eyeData;

  const gradeText = (val, isOver=false) => {
    if (val === 0 || val === '0' || val === undefined || val === null) return { t: '0', c: 'var(--green)' };
    if (frozen) return { t: 'frozen', c: 'var(--darkred)' };
    const s = String(val);
    const col = isOver ? overColor(s) : gradeColor(s);
    return { t: (isOver ? '+' : '-') + s, c: col };
  };

  const g = {
    up: gradeText(up),
    down: gradeText(down),
    left: gradeText(left),
    right: gradeText(right),
    ul: gradeText(ul, ul && String(ul).startsWith('+') ? true : parseFloat(ul||0)>0),
    ur: gradeText(ur, ur && String(ur).startsWith('+') ? true : parseFloat(ur||0)>0),
    dl: gradeText(dl),
    dr: gradeText(dr),
  };

  const nasalLabel = isOS ? 'nasal' : 'nasal';
  const tempLabel = isOS ? 'temporal' : 'temporal';
  // OD: left=temporal, right=nasal
  // OS: left=nasal, right=temporal
  const leftLabel = isOS ? 'nasal' : 'temporal';
  const rightLabel = isOS ? 'temporal' : 'nasal';

  if (frozen) {
    return `<div class="eom-eye">
      <div class="eom-eye-label">${eyeLabel}</div>
      <div style="width:120px;height:120px;background:var(--darkred);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;">
        <div style="font-size:11px;font-weight:700;color:#fff;letter-spacing:.08em;text-transform:uppercase;">Frozen</div>
        <div style="font-size:9px;color:rgba(255,255,255,0.6);letter-spacing:.05em;">No movement</div>
      </div>
    </div>`;
  }

  return `<div class="eom-eye">
    <div class="eom-eye-label">${eyeLabel}</div>
    <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <line x1="60" y1="5" x2="60" y2="115" stroke="var(--border2)" stroke-width="1"/>
      <line x1="5" y1="60" x2="115" y2="60" stroke="var(--border2)" stroke-width="1"/>
      <circle cx="60" cy="60" r="16" fill="var(--surface2)" stroke="var(--border2)" stroke-width="1"/>
      <circle cx="60" cy="60" r="4" fill="var(--text)"/>
      <text x="60" y="17" text-anchor="middle" font-size="13" font-weight="500" fill="${g.up.c}" font-family="-apple-system,sans-serif">${g.up.t}</text>
      <text x="60" y="112" text-anchor="middle" font-size="13" font-weight="500" fill="${g.down.c}" font-family="-apple-system,sans-serif">${g.down.t}</text>
      <text x="13" y="64" text-anchor="middle" font-size="13" font-weight="500" fill="${g.left.c}" font-family="-apple-system,sans-serif">${g.left.t}</text>
      <text x="107" y="64" text-anchor="middle" font-size="13" font-weight="500" fill="${g.right.c}" font-family="-apple-system,sans-serif">${g.right.t}</text>
      <text x="18" y="21" text-anchor="middle" font-size="12" font-weight="500" fill="${g.ul.c}" font-family="-apple-system,sans-serif">${g.ul.t}</text>
      <text x="102" y="21" text-anchor="middle" font-size="12" font-weight="500" fill="${g.ur.c}" font-family="-apple-system,sans-serif">${g.ur.t}</text>
      <text x="18" y="106" text-anchor="middle" font-size="12" font-weight="500" fill="${g.dl.c}" font-family="-apple-system,sans-serif">${g.dl.t}</text>
      <text x="102" y="106" text-anchor="middle" font-size="12" font-weight="500" fill="${g.dr.c}" font-family="-apple-system,sans-serif">${g.dr.t}</text>
      <text x="3" y="70" font-size="7" fill="var(--text3)" font-family="-apple-system,sans-serif" transform="rotate(-90,3,70)">${leftLabel}</text>
      <text x="117" y="70" font-size="7" fill="var(--text3)" font-family="-apple-system,sans-serif" transform="rotate(90,117,70)">${rightLabel}</text>
    </svg>
    ${note ? `<div style="font-size:9px;color:var(--text3)">${note}</div>` : ''}
  </div>`;
}

// ── RENDER PCT CELL ────────────────────────────────────────────────────────
function pctCell(pos, data, isPrimary) {
  const cls = isPrimary ? 'pct-cell primary' : 'pct-cell';
  const posLabel = pos;

  if (!data) {
    return `<div class="${cls}"><div class="pct-pos">${posLabel}</div><div class="pct-empty">—</div></div>`;
  }

  if (data.val === 'ortho') {
    return `<div class="${cls}"><div class="pct-pos">${posLabel}</div><div class="pct-ortho">ortho</div></div>`;
  }
  if (data.val === "can't fix") {
    return `<div class="${cls}"><div class="pct-pos">${posLabel}</div><div class="pct-cantfix">can't fix</div><div class="pct-type">${data.type}</div></div>`;
  }

  return `<div class="${cls}">
    <div class="pct-pos">${posLabel}</div>
    <div class="pct-val">${data.val}</div>
    <div class="pct-type">${data.type}</div>
  </div>`;
}

function pctCellDual(pos, top, bot, isPrimary) {
  const cls = isPrimary ? 'pct-cell primary' : 'pct-cell';
  return `<div class="${cls}">
    <div class="pct-pos">${pos}</div>
    <div class="pct-val" style="font-size:15px">${top.val}</div>
    <div class="pct-type">${top.type}</div>
    <div class="pct-divider"></div>
    <div class="pct-val" style="font-size:15px">${bot.val}</div>
    <div class="pct-type">${bot.type}</div>
  </div>`;
}

function renderPCTGrid(pct, label) {
  const s = pct.far;
  const hasHoriz = s.horiz;

  const cells = [
    // row 1
    pctCell('R upper', null, false),
    pctCell('Up', null, false),
    pctCell('L upper', null, false),
    // row 2
    pctCell('Right', s.right, false),
    // primary
    (() => {
      if (hasHoriz) {
        // dual: top = vertical (R/L etc), bottom = horizontal (ET/XT)
        return pctCellDual('Primary', s.primary, hasHoriz, true);
      }
      return pctCell('Primary', s.primary, true);
    })(),
    pctCell('Left', s.left, false),
    // row 3
    pctCell('R tilt', s.tiltR, false),
    pctCell('Down', null, false),
    pctCell('L tilt', s.tiltL, false),
  ];

  return `<div>
    <div class="pct-label">${label}</div>
    <div class="pct-grid">${cells.join('')}</div>
    <div class="pct-note">values in PD · <span style="font-weight:700">box</span> = primary position</div>
  </div>`;
}

// ── FOLLOW-UP RENDER ───────────────────────────────────────────────────────
function renderFollowup(p) {
  const fus = FOLLOWUPS.filter(f => f.id === p.id).sort((a,b) => a.date.localeCompare(b.date));
  const latest = fus[fus.length - 1];

  // Compare panel: initial vs latest
  const compareWrap = document.getElementById('mCompare');
  if (!latest) {
    compareWrap.innerHTML = `<div style="grid-column:1/-1"><div class="no-fu">No follow-up records yet. Add one below.</div></div>`;
  } else {
    const buildPctEom = (pctStr, eomStr, label, isLatest) => {
      const pctData = parsePCT(pctStr);
      const eomData = parseEOM(eomStr);
      let pctBlock = '';
      if (pctData?.special) {
        pctBlock = `<div class="pct-block"><div class="pct-label">PCT</div><div class="pct-grid"><div class="pct-cell" style="grid-column:1/-1;grid-row:1/-1"><div class="pct-special">${pctData.special}</div></div></div></div>`;
      } else if (pctData?.far) {
        pctBlock = renderPCTGrid(pctData, 'PCT — far');
      }
      let eomBlock = '';
      if (eomData) {
        eomBlock = `<div class="eom-block" style="margin-top:.75rem">
          <div class="eom-label-row">EOM</div>
          <div class="eom-eyes">
            ${eomSVG(eomData.od, 'OD', false)}
            <div class="eom-sep"></div>
            ${eomSVG(eomData.os, 'OS', true)}
          </div>
        </div>`;
      }
      if (!pctBlock && !eomBlock) return `<div class="no-fu">No data</div>`;
      return pctBlock + eomBlock;
    };

    compareWrap.innerHTML = `
      <div>
        <div class="compare-col-label">Initial visit · ${p.date || '—'}</div>
        ${buildPctEom(p.pct, p.eom, 'Initial', false)}
      </div>
      <div>
        <div class="compare-col-label latest">Latest · ${latest.date}</div>
        ${buildPctEom(latest.pct, latest.eom, 'Latest', true)}
        ${latest.note ? `<div style="font-size:11px;color:var(--text2);margin-top:6px">備註：${latest.note}</div>` : ''}
      </div>`;
  }

  // History list
  const histWrap = document.getElementById('mFuHistory');
  if (fus.length === 0) {
    histWrap.innerHTML = '';
  } else {
    histWrap.innerHTML = `<div class="fu-history-title">All follow-up records (${fus.length})</div>` +
      fus.map(f => `<div class="fu-row-item">
        <div class="fu-date">${f.date}</div>
        <div class="fu-content">
          ${f.pct ? `<div><span style="color:var(--text3);font-size:10px">PCT </span>${f.pct}</div>` : ''}
          ${f.eom ? `<div><span style="color:var(--text3);font-size:10px">EOM </span>${f.eom}</div>` : ''}
          ${f.note ? `<div style="color:var(--text3)">${f.note}</div>` : ''}
        </div>
      </div>`).join('');
  }
}

// ── FOLLOW-UP SAVE ─────────────────────────────────────────────────────────
async function submitFU() {
  if (!currentPatient) return;
  const date = document.getElementById('fuDate').value;
  if (!date) { alert('Please enter a date.'); return; }
  const btn = document.getElementById('fuSaveBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;
  const newFU = {
    id: currentPatient.id, date,
    pct: document.getElementById('fuPct').value.trim(),
    eom: document.getElementById('fuEom').value.trim(),
    note: document.getElementById('fuNote').value.trim(),
  };
  try {
    await supaInsert('strab_followup', {
      'ID': currentPatient.id, 'Date': date,
      'PCT': newFU.pct,
      'EOM': newFU.eom,
      'Note': newFU.note,
    });
    FOLLOWUPS.push(newFU);
    clearFuForm();
    const ok = document.getElementById('fuSaveOk');
    ok.style.display = 'inline'; setTimeout(() => ok.style.display = 'none', 3000);
    renderFollowup(currentPatient);
  } catch(e) {
    alert('Save failed. Please check your connection.');
  } finally {
    btn.textContent = '💾 Save'; btn.disabled = false;
  }
}

function clearFuForm() {
  ['fuPct','fuEom','fuNote'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
}

// ── MODAL RENDER ───────────────────────────────────────────────────────────
function openModal(p) {
  currentPatient = p;
  document.getElementById('mIdBadge').textContent = p.id;

  document.getElementById('mSub').textContent = [p.cc, p.age ? `Age ${p.age}` : null, p.sex || null, p.date].filter(Boolean).join(' · ');

  // Meta
  const meta = [
    { label: 'Age', val: p.age ?? '—' },
    { label: 'Sex', val: p.sex || '—' },
    { label: 'Referral', val: p.ref || '—' },
    { label: 'Chief complaint', val: p.cc || '—' },
    { label: 'Underlying', val: p.und || '—' },
    { label: 'Fundus', val: p.fd || '—' },
    { label: 'Neuroimaging', val: p.img || '—' },
    { label: 'Diagnosis', val: p.dx || '—' },

    `<div class="meta-item"><div class="meta-label">${m.label}</div><div class="meta-value">${m.val}</div></div>`
  ).join('');

  // PCT + EOM — side by side

  const eomData = parseEOM(p.eom);

  const gradingStrip = `<div class="grading-strip">
    <span class="grade-chip"><span class="grade-chip-val" style="color:var(--blue)">+1~4</span><span>Overaction</span></span>
    <span class="grade-chip"><span class="grade-chip-val" style="color:var(--green)">0</span><span>Full</span></span>
    <span class="grade-chip"><span class="grade-chip-val" style="color:var(--amber)">−1</span><span>Mild</span></span>
    <span class="grade-chip"><span class="grade-chip-val" style="color:var(--red)">−2</span><span>Moderate</span></span>
    <span class="grade-chip"><span class="grade-chip-val" style="color:var(--darkred)">−3</span><span>Can't cross midline</span></span>
    <span class="grade-chip"><span class="grade-chip-val" style="color:var(--xdarkred)">−4</span><span>Opposite side</span></span>
  </div>`;

  if (!pctData && !eomData) {
    document.getElementById('mPctEom').innerHTML =
      `<div class="no-pct">No PCT or EOM data recorded.</div>` +
      (p.rem ? `<div style="font-size:12px;color:var(--text2);margin-top:6px">${p.rem}</div>` : '');
  } else {
    // Build PCT block
    let pctBlock = '';
    if (pctData?.special) {
      pctBlock = `<div class="pct-block">
        <div class="pct-label">PCT — far</div>
        <div class="pct-grid"><div class="pct-cell" style="grid-column:1/-1;grid-row:1/-1"><div class="pct-special">${pctData.special}</div></div></div>
      </div>`;
    } else if (pctData?.far) {
      pctBlock = renderPCTGrid(pctData, 'PCT — far');
    }

    // Build EOM block (no top margin — it's beside PCT now)
    let eomBlock = '';
    if (eomData) {
      eomBlock = `<div class="eom-block">
        <div class="eom-label-row">EOM — patient-facing</div>
        <div class="eom-eyes">
          ${eomSVG(eomData.od, 'OD', false)}
          <div class="eom-sep"></div>
          ${eomSVG(eomData.os, 'OS', true)}
        </div>
      </div>`;
    }

    // Vertical divider between PCT and EOM
    const divider = (pctBlock && eomBlock)
      ? `<div style="width:1px;background:var(--border2);border-radius:1px;align-self:stretch;margin:0 4px;"></div>`
      : '';

    document.getElementById('mPctEom').innerHTML = `
      <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;">
        ${pctBlock}
        ${divider}
        ${eomBlock}
      </div>
      ${gradingStrip}
    `;
  }

  // Remark
  const remParts = [p.rem, p.und ? `Underlying: ${p.und}` : '', p.img && p.img !== 'NA' ? `Imaging: ${p.img}` : ''].filter(Boolean);
  document.getElementById('mRemark').innerHTML = remParts.length
    ? remParts.join('<br>')
    : '<span style="color:var(--text3)">—</span>';

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Follow-up
  document.getElementById('fuDate').value = new Date().toISOString().slice(0,10);
  clearFuForm();
  renderFollowup(p);
}

function closeModal(e) {

}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    sex:  String(row['Sex']       || '').trim(),

}

function initDashboard() {
  RAW.forEach(p => patients[p.id + (patients[p.id] ? '_dup' : '')] = p);

  const ages = RAW.map(p => p.age).filter(a => a !== null && !isNaN(a));
  document.getElementById('kN').textContent = RAW.length;
  if (ages.length) {
    document.getElementById('kAge').textContent = Math.round(ages.reduce((a,b) => a+b, 0) / ages.length);
    document.getElementById('kAgeR').textContent = `range ${Math.min(...ages)}–${Math.max(...ages)} yrs`;
  }
  document.getElementById('kPCT').textContent = RAW.filter(p => p.pct).length;
  document.getElementById('kEOM').textContent = RAW.filter(p => p.eom).length;
  document.getElementById('kNeuro').textContent = RAW.filter(p => p.img && p.img !== 'NA' && p.img !== '').length;
  document.getElementById('subtitle').textContent = `${RAW.length} patients · ${FOLLOWUPS.length} follow-ups · refreshed ${new Date().toLocaleTimeString()}`;

  // Dx filter
  const dxSel = document.getElementById('dxF');
  dxSel.innerHTML = '<option value="">All diagnoses</option>';
  const dxSet = [...new Set(RAW.map(p => p.dx).filter(Boolean))].sort();
  dxSet.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; dxSel.appendChild(o); });

  renderTable();
}

async function loadData() {
  document.getElementById('subtitle').innerHTML = '<span style="opacity:.6">⟳ Fetching live data…</span>';
  try {
    const [pRows, fRows] = await Promise.all([
      supaFetch('strab_patients'),
      supaFetch('strab_followup')
    ]);
    RAW = pRows.map(normalizeRow).filter(p => p.id && p.id.length > 2);
    FOLLOWUPS = fRows.map(r => ({
      id:   String(r['ID']   || '').trim(),
      date: String(r['Date'] || '').trim(),
      pct:  String(r['PCT']  || '').trim(),
      eom:  String(r['EOM']  || '').trim(),
      note: String(r['Note'] || '').trim(),
    })).filter(f => f.id && f.date);
    initDashboard();
  } catch(e) {
    document.getElementById('subtitle').textContent = '⚠ Could not load live data';
    console.error(e);
    RAW = []; FOLLOWUPS = [];
    initDashboard();
  }
}

// Refresh button
document.getElementById('refreshBtn').onclick = loadData;

loadData();
</script>
</body>
</html>
